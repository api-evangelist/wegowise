description: WegoWise (now part of the Comply / AppFolio property-tech stack) is a SaaS benchmarking
  platform for multifamily building energy and water consumption. Subscription tiers (Premium, Pro,
  Home) are referenced on wegowise.com but are sold via sales engagement; the platform does not advertise
  a self-serve developer API plan or per-call pricing.
notes: No public developer-API pricing page found at wegowise.com. Tiered SaaS plans are sold-led;
  scaffold reduced to one Contact Sales plan covering the SaaS subscription itself.
