naftiko: "1.0.0-alpha1"

info:
  label: "WegoWise API"
  description: >-
    The WegoWise API (now Comply by Measurabl) enables building owners, property managers,
    and energy service providers to manage building portfolios, track utility meter data,
    and benchmark energy and water performance across multifamily and commercial properties.
  tags:
    - WegoWise
    - Building Energy
    - Benchmarking
    - Energy Efficiency
    - Property Management
    - Multifamily
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WEGOWISE_OAUTH_KEY: WEGOWISE_OAUTH_KEY
      WEGOWISE_OAUTH_SECRET: WEGOWISE_OAUTH_SECRET
      WEGOWISE_TOKEN: WEGOWISE_TOKEN
      WEGOWISE_TOKEN_SECRET: WEGOWISE_TOKEN_SECRET

capability:
  consumes:
    - type: http
      namespace: wegowise
      baseUri: https://www.wegowise.com
      description: "WegoWise REST API for building energy benchmarking"
      authentication:
        type: bearer
        token: "{{WEGOWISE_TOKEN}}"
      resources:
        - name: utility-companies
          path: /api/v1/utility_companies
          description: "Public list of supported utility companies"
          operations:
            - name: list-utility-companies
              method: GET
              description: "List all utility companies supported for automated data import"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: buildings
          path: /api/v1/wego_pro/buildings
          description: "Building portfolio management"
          operations:
            - name: list-buildings
              method: GET
              description: "List all buildings the user has access to"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-building
              method: GET
              description: "Get details for a specific building"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Building ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: building-data
          path: /api/v1/wego_pro/buildings/{id}/data
          description: "Building normalized monthly usage data"
          operations:
            - name: get-building-data
              method: GET
              description: "Get normalized monthly energy and water usage data for a building"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Building ID"
                - name: data_type
                  in: query
                  type: string
                  required: false
                  description: "Utility type: electric, gas, oil, water"
                - name: unit
                  in: query
                  type: string
                  required: false
                  description: "Unit of measurement: kwh, therms, gallons, etc."
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: "Start date (YYYY-MM-DD)"
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: "End date (YYYY-MM-DD)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: building-meters
          path: /api/v1/wego_pro/buildings/{id}/meters
          description: "Meters associated with a building"
          operations:
            - name: list-building-meters
              method: GET
              description: "List all utility meters for a building"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Building ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: apartments
          path: /api/v1/wego_pro/buildings/{id}/apartments
          description: "Apartment units within buildings"
          operations:
            - name: list-apartments
              method: GET
              description: "List all apartments within a building"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Building ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: meter-raw-data
          path: /api/v1/wego_pro/meters/{id}/raw_data
          description: "Raw utility usage datapoints for a meter"
          operations:
            - name: get-meter-raw-data
              method: GET
              description: "Get all raw utility datapoints for a meter"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Meter ID"
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: "Start date (YYYY-MM-DD)"
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: "End date (YYYY-MM-DD)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-meter-datapoint
              method: POST
              description: "Manually create a utility usage datapoint"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Meter ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  start_date: "{{tools.start_date}}"
                  end_date: "{{tools.end_date}}"
                  total_charge: "{{tools.total_charge}}"
                  kwh: "{{tools.kwh}}"

        - name: data-meters
          path: /api/v1/wego_data/meters
          description: "Meters for automated utility data import (data-only accounts)"
          operations:
            - name: list-data-meters
              method: GET
              description: "List all data meters for the authorized user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-data-meter
              method: POST
              description: "Create a meter with utility credentials for automated import"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  account_number: "{{tools.account_number}}"
                  utility_company_id: "{{tools.utility_company_id}}"
                  data_type: "{{tools.data_type}}"
                  username: "{{tools.username}}"
                  password: "{{tools.password}}"

        - name: latest-datum
          path: /api/v1/wego_data/meters/{id}/latest_datum
          description: "Most recent datapoint for a meter"
          operations:
            - name: get-latest-datum
              method: GET
              description: "Get the most recent utility usage datapoint for a meter"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Meter ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: wegowise-api
      resources:
        - path: /v1/buildings
          name: buildings
          operations:
            - method: GET
              name: list-buildings
              description: "List buildings"
              call: "wegowise.list-buildings"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/utility-companies
          name: utility-companies
          operations:
            - method: GET
              name: list-utility-companies
              description: "List supported utility companies"
              call: "wegowise.list-utility-companies"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: wegowise-mcp
      transport: http
      tools:
        - name: list-utility-companies
          description: "List all utility companies supported for automated data import"
          hints:
            readOnly: true
          call: "wegowise.list-utility-companies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-buildings
          description: "List all buildings in the portfolio"
          hints:
            readOnly: true
          call: "wegowise.list-buildings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-building
          description: "Get details for a specific building"
          hints:
            readOnly: true
          call: "wegowise.get-building"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-building-energy-data
          description: "Get monthly energy and water usage data for a building"
          hints:
            readOnly: true
          call: "wegowise.get-building-data"
          with:
            id: "tools.id"
            data_type: "tools.data_type"
            unit: "tools.unit"
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-building-meters
          description: "List all utility meters for a building"
          hints:
            readOnly: true
          call: "wegowise.list-building-meters"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-meter-raw-data
          description: "Get raw utility datapoints for a meter"
          hints:
            readOnly: true
          call: "wegowise.get-meter-raw-data"
          with:
            id: "tools.id"
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-latest-datum
          description: "Get the most recent usage datapoint for a meter"
          hints:
            readOnly: true
          call: "wegowise.get-latest-datum"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
