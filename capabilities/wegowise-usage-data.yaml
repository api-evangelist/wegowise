        destructive: false
        idempotent: true
      call: wegowise-usage-data.getdatameterrawdata
      with:
        start_date: tools.start_date
        end_date: tools.end_date
      outputParameters:
      - type: object
        mapping: $.
    - name: create-data-meter-datapoint
      description: Create Data Meter Datapoint
      hints:
