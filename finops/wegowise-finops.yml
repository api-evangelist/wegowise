meters:
  - name: subscription_fee
    description: WegoWise / Comply benchmarking subscription, scaled by portfolio size and tier.
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - portfolio_size
principles:
  - name: Visibility
    description: Spend visibility comes from the WegoWise / Comply subscription invoice and the
      portfolio-size record on the customer's account.
  - name: Allocation
    description: Allocate WegoWise spend across owners / portfolios / buildings using the platform's
      portfolio hierarchy and internal property-management cost-center tags.
  - name: Optimization
    description: Cost levers are tier selection (Premium / Pro / Home), portfolio rationalization, and
      multi-year commitments at renewal.
  - name: Accountability
    description: Sustainability / asset-management leads in the property owner / manager organization
      hold accountability and coordinate renewals with WegoWise account management.
